name: Build & Test

on:
  push:
    branches: [main, 'task/**', 'feature/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  build:
    runs-on: ubuntu-latest
    needs: [backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
          - target: keenetic-mipsel
            goos: linux
            goarch: mipsle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/angry-box-${{ matrix.target }} ./cmd/angry-box

      - uses: actions/upload-artifact@v4
        with:
          name: angry-box-${{ matrix.target }}
          path: dist/angry-box-${{ matrix.target }}
