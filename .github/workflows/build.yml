name: Build & Test

on:
  push:
    branches: [main, 'task/**', 'feature/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          # Install using the project's Go 1.26 so it can handle go 1.26 modules
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64

          # Run linter. We use --issues-exit-code=0 so this step never fails the job
          # (we are gradually cleaning up the codebase). The report will be uploaded as artifact.
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m --issues-exit-code=0 --out-format=colored-line-number > golangci-lint-report.txt 2>&1 || true

      - name: Upload golangci-lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golangci-lint-report
          path: golangci-lint-report.txt
          retention-days: 7

      - name: Test
        run: go test ./... -count=1 -timeout 60s

  build:
    runs-on: ubuntu-latest
    needs: [backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
          - target: keenetic-mipsel
            goos: linux
            goarch: mipsle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/angry-box-${{ matrix.target }} ./cmd/angry-box

      - name: Build Keenetic .ipk (for testing)
        if: matrix.target == 'keenetic-mipsel'
        env:
          VERSION: "pr-${{ github.event.pull_request.number || github.sha }}"
        run: |
          echo "==> Building test .ipk for Keenetic"
          chmod +x ./scripts/build-opkg.sh
          ./scripts/build-opkg.sh "dist/angry-box-keenetic-mipsel" mipsel_24kc "$VERSION" dist
          ls -lh dist/*.ipk || true

      - name: Build arm64 .ipk (for testing)
        if: matrix.target == 'linux-arm64'
        env:
          VERSION: "pr-${{ github.event.pull_request.number || github.sha }}"
        run: |
          echo "==> Building test .ipk for arm64 OpenWRT/Entware"
          chmod +x ./scripts/build-opkg.sh
          ./scripts/build-opkg.sh "dist/angry-box-linux-arm64" "$VERSION" aarch64_cortex-a53 dist
          ls -lh dist/*.ipk || true

      - uses: actions/upload-artifact@v4
        with:
          name: angry-box-${{ matrix.target }}
          path: |
            dist/angry-box-${{ matrix.target }}
            dist/*.ipk
          retention-days: 7
