name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty for git tag)'
        required: false

permissions:
  contents: write

jobs:
  # ── Web UI build (shared across all Go builds) ──
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build Vue SPA
        working-directory: lucx-web
        run: |
          npm ci
          npx vue-tsc --noEmit
          npm run build
      - name: Copy dist for Go embed
        run: |
          rm -rf web/dist
          cp -r lucx-web/dist web/dist
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # ── Matrix build: all architectures ──
  build:
    needs: web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard server targets
          - target: linux-amd64
            goos: linux
            goarch: amd64
            upx: false
            extraflags: ''

          - target: linux-arm64
            goos: linux
            goarch: arm64
            upx: true
            extraflags: '-buildmode=pie'

          # ARMv8 (64-bit, optimized) — newer Raspberry Pi 4/5, ARM servers
          - target: linux-arm64-v8
            goos: linux
            goarch: arm64
            goarm: '8'
            upx: true
            extraflags: '-buildmode=pie'

          # ARMv7 routers (OpenWrt, old Raspberry Pi)
          - target: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            upx: true
            extraflags: ''

          # Keenetic routers — MIPS Little Endian
          - target: keenetic-mipsel
            goos: linux
            goarch: mipsle
            gomips: softfloat
            upx: true
            extraflags: ''

          # MIPS Big Endian — older OpenWrt / some Keenetic models
          - target: openwrt-mips
            goos: linux
            goarch: mips
            gomips: softfloat
            upx: true
            extraflags: ''

    env:
      APP: lucx-core
      OUT_DIR: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Compute version
        id: ver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          TRIGGER: ${{ github.event_name }}
        run: |
          if [[ "$TRIGGER" == "push" && "$REF_TYPE" == "tag" ]]; then
            # Strip 'v' prefix for clean semver
            V="${REF_NAME#v}"
          elif [[ "$TRIGGER" == "workflow_dispatch" && -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')"
            V="${V#v}"
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "version=$V"

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1 -timeout 90s

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOMIPS: ${{ matrix.gomips || '' }}
          CGO_ENABLED: '0'
          TARGET: ${{ matrix.target }}
          EXTRAFLAGS: ${{ matrix.extraflags }}
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          mkdir -p "$OUT_DIR"

          LDFLAGS="-s -w -X github.com/alexeylcp/lucx-core/internal/api.Version=${VERSION}"

          BIN="${OUT_DIR}/${APP}-${TARGET}"

          echo "Building ${BIN} (GOOS=${GOOS} GOARCH=${GOARCH} GOARM=${GOARM} CGO_ENABLED=${CGO_ENABLED})"
          go build -trimpath -ldflags="${LDFLAGS}" ${EXTRAFLAGS} -o "${BIN}" ./cmd/${APP}/

          ls -lh "${BIN}"
          file "${BIN}" || true

      - name: Compress with UPX (router targets)
        if: ${{ matrix.upx }}
        run: |
          BIN="${OUT_DIR}/${APP}-${{ matrix.target }}"
          if command -v upx &>/dev/null; then
            upx --best --lzma --force-pie "${BIN}" 2>/dev/null || upx --best --lzma "${BIN}" 2>/dev/null || echo "UPX skipped (incompatible binary)"
            ls -lh "${BIN}"
          else
            echo "UPX not installed — installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl
            upx --best --lzma --force-pie "${BIN}" 2>/dev/null || upx --best --lzma "${BIN}" 2>/dev/null || echo "UPX skipped (incompatible binary)"
            ls -lh "${BIN}"
          fi

      - name: Package tar.gz
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          set -euo pipefail
          BIN="${OUT_DIR}/${APP}-${TARGET}"
          chmod +x "${BIN}"

          TAR_NAME="${APP}-${VERSION}-${TARGET}"
          TAR_DIR="${OUT_DIR}/${TAR_NAME}"
          mkdir -p "${TAR_DIR}"

          cp "${BIN}" "${TAR_DIR}/${APP}"
          cp README.md "${TAR_DIR}/"

          tar czf "${OUT_DIR}/${TAR_NAME}.tar.gz" -C "$OUT_DIR" "$TAR_NAME"
          echo "Package: ${OUT_DIR}/${TAR_NAME}.tar.gz"
          ls -lh "${OUT_DIR}/${TAR_NAME}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            build/*.tar.gz
            build/*.ipk
          retention-days: 7

  # ── GitHub Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.ipk' \) -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Generate SHA256 checksums
        env:
          REF: ${{ github.ref_name }}
        run: |
          cd release-assets
          shopt -s nullglob
          FILES=( *.tar.gz *.ipk )
          if [ ${#FILES[@]} -gt 0 ]; then
            sha256sum "${FILES[@]}" > "lucx-core-${REF#v}-checksums.txt"
            cat "lucx-core-${REF#v}-checksums.txt"
          fi
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
