name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty for git tag)'
        required: false

permissions:
  contents: write

jobs:
  # ── Build for all supported targets ──
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard server targets
          - target: linux-amd64
            goos: linux
            goarch: amd64
            upx: false
            extraflags: ''

          - target: linux-arm64
            goos: linux
            goarch: arm64
            upx: true
            extraflags: '-buildmode=pie'

          - target: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
            upx: true
            extraflags: ''

          # Keenetic routers — MIPS Little Endian (primary router target)
          - target: keenetic-mipsel
            goos: linux
            goarch: mipsle
            gomips: softfloat
            upx: true
            extraflags: ''

    env:
      APP: angry-box

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compute version
        id: ver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          TRIGGER: ${{ github.event_name }}
        run: |
          if [[ "$TRIGGER" == "push" && "$REF_TYPE" == "tag" ]]; then
            V="${REF_NAME#v}"
          elif [[ "$TRIGGER" == "workflow_dispatch" && -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')"
            V="${V#v}"
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1 -timeout 90s

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          GOMIPS: ${{ matrix.gomips || '' }}
          CGO_ENABLED: '0'
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          mkdir -p build

          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          BIN="build/${APP}-${{ matrix.target }}"

          echo "Building ${BIN}"
          go build -trimpath -ldflags="${LDFLAGS}" ${{ matrix.extraflags }} -o "${BIN}" ./cmd/angry-box/

          ls -lh "${BIN}"
          file "${BIN}" || true

      - name: Compress with UPX (for router targets)
        if: ${{ matrix.upx }}
        run: |
          BIN="build/${APP}-${{ matrix.target }}"
          if command -v upx &>/dev/null; then
            upx --best --lzma --force-pie "${BIN}" 2>/dev/null || upx --best --lzma "${BIN}" 2>/dev/null || echo "UPX skipped"
            ls -lh "${BIN}"
          else
            echo "UPX not installed, skipping compression"
          fi

      - name: Package release tarball
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          set -euo pipefail
          BIN="build/${APP}-${TARGET}"
          chmod +x "${BIN}"

          TAR_NAME="${APP}-${VERSION}-${TARGET}"
          TAR_DIR="build/${TAR_NAME}"
          mkdir -p "${TAR_DIR}"

          cp "${BIN}" "${TAR_DIR}/${APP}"
          cp README.md "${TAR_DIR}/" 2>/dev/null || true
          cp README.*.md "${TAR_DIR}/" 2>/dev/null || true
          cp config.example.toml "${TAR_DIR}/" 2>/dev/null || true
          cp LICENSE "${TAR_DIR}/" 2>/dev/null || true
          cp scripts/install.sh "${TAR_DIR}/" 2>/dev/null || true

          tar czf "build/${TAR_NAME}.tar.gz" -C build "${TAR_NAME}"
          echo "Created build/${TAR_NAME}.tar.gz"
          ls -lh "build/${TAR_NAME}.tar.gz"

      - name: Build Keenetic .ipk package
        if: matrix.target == 'keenetic-mipsel'
        env:
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          set -euo pipefail
          echo "==> Building .ipk for Keenetic / Entware"
          ./scripts/build-keenetic-opkg.sh "build/${APP}-keenetic-mipsel" "$VERSION" build
          ls -lh build/*.ipk || true

      - name: Build arm64 .ipk package
        if: matrix.target == 'linux-arm64'
        env:
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          set -euo pipefail
          echo "==> Building arm64 .ipk for OpenWRT/Entware"
          ./scripts/build-opkg.sh "build/${APP}-linux-arm64" "$VERSION" aarch64_cortex-a53 build
          ls -lh build/*.ipk || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            build/*.tar.gz
            build/*.ipk
          retention-days: 7

  # ── Create GitHub Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.ipk' \) -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Generate SHA256 checksums
        env:
          REF: ${{ github.ref_name }}
        run: |
          cd release-assets
          shopt -s nullglob
          FILES=( *.tar.gz )
          if [ ${#FILES[@]} -gt 0 ]; then
            sha256sum "${FILES[@]}" > "angry-box-${REF#v}-checksums.txt"
            cat "angry-box-${REF#v}-checksums.txt"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
