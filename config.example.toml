# Angry-BOX orchestrator configuration
# Place at /etc/angry-box/angry-box.toml (or set ANGRY_BOX_CONFIG)

listen_addr = ":8090"
store_file  = "/etc/angry-box/store.json"

# Default backend when not specified on CLI
default_backend = "sing-box"

